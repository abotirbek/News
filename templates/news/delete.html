{% extends 'base.html' %}
{% block content %}

<style>
    body {
        margin: 0;
        background: #f3f4f6;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        color: #111827;
    }

    .delete-wrapper {
        min-height: 80vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
    }

    .delete-card {
        width: 100%;
        max-width: 520px;
        background: #ffffff;
        border-radius: 16px;
        padding: 36px 32px;
        text-align: center;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        border: 1px solid #e5e7eb;
    }

    .icon {
        width: 64px;
        height: 64px;
        margin: 0 auto 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 28px;
        border-radius: 50%;
        background: #fee2e2;
        color: #dc2626;
    }

    .warning-title {
        font-size: 22px;
        font-weight: 700;
        margin-bottom: 10px;
        color: #111827;
    }

    .warning-text {
        font-size: 15px;
        line-height: 1.6;
        color: #6b7280;
        margin-bottom: 26px;
    }

    .actions {
        display: flex;
        gap: 12px;
        justify-content: center;
        flex-wrap: wrap;
    }

    .btn {
        padding: 11px 18px;
        border-radius: 10px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        text-decoration: none;
        transition: 0.2s ease;
        border: none;
    }

    .btn-danger {
        background: #dc2626;
        color: #fff;
    }

    .btn-danger:hover {
        background: #b91c1c;
    }

    .btn-secondary {
        background: #f3f4f6;
        color: #111827;
        border: 1px solid #e5e7eb;
    }

    .btn-secondary:hover {
        background: #e5e7eb;
    }

    .hint {
        margin-top: 14px;
        font-size: 12px;
        color: #9ca3af;
    }
</style>

<div class="delete-wrapper">

    <div class="delete-card">

        <div class="icon">⚠</div>

        <div class="warning-title">
            Delete this article?
        </div>

        <div class="warning-text">
            This action cannot be undone. The article will be permanently removed from your system.
        </div>

        <form method="post">
            {% csrf_token %}

            <div class="actions">
                <button type="submit" class="btn btn-danger">
                    Yes, delete
                </button>

                <a href="{% url 'news' %}" class="btn btn-secondary">
                    Cancel
                </a>
            </div>

        </form>

        <div class="hint">
            Tip: You can archive instead of deleting if you want to keep records.
        </div>

    </div>

</div>

{% endblock %}
