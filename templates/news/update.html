{% extends 'base.html' %}
{% block content %}

<style>
    body {
        background: #f5f5f5;
        margin: 0;
        padding: 0;
    }

    .editor-container {
        max-width: 900px;
        margin: 50px auto;
        background: #fff;
        border: 1px solid #d9d9d9;
        box-shadow: 0 5px 20px rgba(0, 0, 0, 0.08);
        padding: 50px 60px;
        font-family: "Times New Roman", Times, serif;
    }

    .editor-header {
        text-align: center;
        margin-bottom: 40px;
        border-bottom: 2px solid #e5e5e5;
        padding-bottom: 20px;
    }

    .editor-header h2 {
        margin: 0;
        font-size: 38px;
        color: #111;
        font-weight: bold;
    }

    .editor-header p {
        margin-top: 10px;
        color: #777;
        font-style: italic;
        font-size: 16px;
    }

    .form-group {
        margin-bottom: 30px;
    }

    .form-group label {
        display: block;
        margin-bottom: 10px;
        font-size: 18px;
        font-weight: bold;
        color: #222;
    }

    .form-group input,
    .form-group textarea {
        width: 100%;
        box-sizing: border-box;
        padding: 15px;
        border: 1px solid #cfcfcf;
        font-size: 18px;
        font-family: "Times New Roman", Times, serif;
        background: #fafafa;
        transition: 0.3s;
    }

    .form-group input:focus,
    .form-group textarea:focus {
        outline: none;
        border-color: #222;
        background: #fff;
    }

    .title-input {
        font-size: 24px;
        font-weight: bold;
    }

    .content-input {
        min-height: 400px;
        resize: vertical;
        line-height: 1.8;
    }

    .editor-actions {
        text-align: center;
        margin-top: 40px;
    }

    .publish-btn {
        background: #111;
        color: white;
        border: none;
        padding: 14px 40px;
        font-size: 18px;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
    }

    .publish-btn:hover {
        background: #333;
    }

    @media (max-width: 768px) {
        .editor-container {
            margin: 20px;
            padding: 30px;
        }

        .editor-header h2 {
            font-size: 30px;
        }

        .content-input {
            min-height: 250px;
        }
    }
</style>

<div class="editor-container">

    <div class="editor-header">
        <h2>Create Article</h2>
        <p>Write and publish a professional article</p>
    </div>

    <form method="post">
        {% csrf_token %}

        <div class="form-group">
            <label for="title">Article Title</label>
            <input
                type="text"
                name="title"
                id="title"
                class="title-input"
                placeholder="Enter article title..."
                value="{{ new.title }}"
                required
            >
        </div>

        <div class="form-group">
            <label for="content">Article Content</label>
            <textarea
                name="content"
                id="content"
                class="content-input"
                placeholder="Write your article here..."
                required
            >{{ new.content }}</textarea>
        </div>

        <div class="editor-actions">
            <button type="submit" class="publish-btn">
                Publish Article
            </button>
        </div>

    </form>

</div>

{% endblock %}
