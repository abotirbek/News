{% extends 'base.html' %}

{% block content %}

<style>

    body {
        margin: 0;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: #f5f7fb;
        color: #1f2937;
    }

    .wrapper {
        max-width: 1000px;
        margin: 60px auto;
        padding: 0 20px;
    }

    .page-title {
        text-align: center;
        font-size: 40px;
        font-weight: 800;
        margin-bottom: 40px;
        color: #111827;
    }

    .page-title::after {
        content: "";
        width: 80px;
        height: 4px;
        background: #6366f1;
        display: block;
        margin: 12px auto 0;
        border-radius: 10px;
    }

    /* ROW LIST CONTAINER */
    .list {
        display: flex;
        flex-direction: column;
        gap: 18px;
    }

    /* ROW CARD */
    .card {
        display: flex;
        flex-direction: column;
        gap: 10px;

        background: white;
        border-radius: 14px;
        padding: 18px 22px;

        border: 1px solid #eef2f7;
        box-shadow: 0 6px 18px rgba(0,0,0,0.04);

        transition: 0.25s ease;
    }

    .card:hover {
        transform: translateX(6px);
        box-shadow: 0 12px 28px rgba(0,0,0,0.08);
    }

    .top-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .badge {
        font-size: 12px;
        padding: 5px 10px;
        border-radius: 999px;
        background: #eef2ff;
        color: #4f46e5;
        font-weight: 600;
    }

    .date {
        font-size: 12px;
        color: #6b7280;
    }

    .title {
        font-size: 20px;
        font-weight: 700;
        color: #111827;
    }

    .content {
        font-size: 14px;
        line-height: 1.6;
        color: #4b5563;
    }

    .bottom-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: 8px;
        border-top: 1px solid #f1f5f9;
        padding-top: 10px;
    }

    .btn {
        text-decoration: none;
        font-size: 13px;
        padding: 7px 12px;
        border-radius: 8px;
        background: #111827;
        color: white;
        transition: 0.2s;
    }

    .btn:hover {
        background: #6366f1;
    }

</style>

<div class="wrapper">

    <h1 class="page-title">Latest News</h1>

    <div class="list">

        {% for new in news %}

        <div class="card">

            <div class="top-row">
                <span class="date">{{ new.created_at }}</span>
            </div>

            <div class="title">
                {{ new.title }}
            </div>

            <div class="bottom-row">
                <a href="#" class="btn">Read more</a>
            </div>

        </div>

        {% endfor %}

    </div>

</div>

{% endblock %}
