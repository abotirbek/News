{% extends 'base.html' %}
{% block content %}

<style>
    body {
        background: #f5f5f5;
        margin: 0;
        padding: 0;
    }

    .article-view {
        max-width: 900px;
        margin: 50px auto;
        padding: 60px 70px;
        background: #fff;
        border: 1px solid #dcdcdc;
        box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        font-family: "Times New Roman", Times, serif;
    }

    .article-title {
        font-size: 42px;
        font-weight: bold;
        text-align: center;
        color: #111;
        margin-bottom: 25px;
        line-height: 1.3;
    }

    .article-meta {
        text-align: center;
        font-size: 15px;
        color: #666;
        margin-bottom: 35px;
        border-bottom: 1px solid #ccc;
        padding-bottom: 15px;
        font-style: italic;
    }

    .article-content {
        font-size: 20px;
        line-height: 2;
        color: #222;
        text-align: justify;
        text-indent: 40px;
        white-space: pre-line;
    }

    .article-content p {
        margin-bottom: 20px;
    }

    .article-back {
        margin-top: 40px;
        text-align: center;
    }

    .article-back a {
        text-decoration: none;
        color: #fff;
        background: #222;
        padding: 10px 25px;
        border-radius: 4px;
        transition: 0.3s;
        font-size: 16px;
    }

    .article-back a:hover {
        background: #444;
    }

    @media (max-width: 768px) {
        .article-view {
            padding: 30px;
            margin: 20px;
        }

        .article-title {
            font-size: 30px;
        }

        .article-content {
            font-size: 18px;
            line-height: 1.8;
        }
    }
</style>

<div class="article-view">

    <h1 class="article-title">{{ new.title }}</h1>

    <div class="article-meta">
        Published Article
    </div>

    <div class="article-content">
        {{ new.content }}
    </div>

    <div class="article-back">
        <a href="{% url 'news' %}">← Back to News</a>
    </div>

</div>

{% endblock %}
